<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"><title>三角形計算</title><link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"><style>:root{--bg:#0f1117;--surface:#1a1d27;--surface2:#222636;--accent:#5ee7c0;--accent2:#7b8cff;--text:#e8eaf0;--muted:#6b7280;--border:#2d3148;--error:#ff6b6b}*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--text);font-family:'Zen Kaku Gothic New',sans-serif;min-height:100vh;padding:20px 16px 40px}h1{text-align:center;font-size:1.3rem;font-weight:700;letter-spacing:.08em;color:var(--accent);margin-bottom:4px}.subtitle{text-align:center;font-size:.72rem;color:var(--muted);margin-bottom:20px;letter-spacing:.05em}.tabs{display:flex;gap:8px;margin-bottom:20px}.tab{flex:1;padding:10px 6px;background:var(--surface);border:1.5px solid var(--border);border-radius:10px;color:var(--muted);font-family:inherit;font-size:.78rem;font-weight:700;cursor:pointer;transition:all .2s;text-align:center;letter-spacing:.04em}.tab.active{background:var(--accent);color:#0f1117;border-color:var(--accent)}.card{background:var(--surface);border:1.5px solid var(--border);border-radius:16px;padding:20px 16px;margin-bottom:16px}.card-title{font-size:.72rem;font-weight:700;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:14px}.triangle-wrap{display:flex;justify-content:center;margin-bottom:16px}.triangle-svg{width:180px;height:120px}.input-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}.input-group{display:flex;flex-direction:column;gap:5px}.input-group.full{grid-column:1/-1}label{font-size:.72rem;color:var(--muted);font-weight:700;letter-spacing:.06em}label span{color:var(--accent);font-family:'DM Mono',monospace}input[type=number]{background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Mono',monospace;font-size:1rem;padding:10px 12px;width:100%;outline:none;transition:border-color .2s;-webkit-appearance:none}input[type=number]:focus{border-color:var(--accent)}input[type=number]::placeholder{color:var(--muted);font-size:.8rem}.calc-btn{width:100%;padding:14px;background:var(--accent);color:#0f1117;border:none;border-radius:10px;font-family:inherit;font-size:1rem;font-weight:700;cursor:pointer;letter-spacing:.05em;transition:opacity .2s,transform .1s;margin-bottom:10px}.calc-btn:active{opacity:.85;transform:scale(.98)}.clear-btn{width:100%;padding:10px;background:transparent;color:var(--muted);border:1.5px solid var(--border);border-radius:10px;font-family:inherit;font-size:.82rem;cursor:pointer;transition:all .2s}.result-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.result-item{background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:12px 10px;text-align:center;transition:border-color .3s}.result-item.highlight{border-color:var(--accent)}.result-label{font-size:.65rem;color:var(--muted);font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px}.result-value{font-family:'DM Mono',monospace;font-size:1.05rem;font-weight:500;color:var(--accent)}.result-item.full{grid-column:1/-1}.error-msg{color:var(--error);font-size:.78rem;text-align:center;padding:8px;background:rgba(255,107,107,.1);border-radius:8px;margin-bottom:10px;display:none}.error-msg.show{display:block}@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}.result-item{animation:fadeIn .3s ease both}.hidden{display:none}</style></head><body><h1>△ 三角形計算機</h1><p class="subtitle">直角三角形の各辺・角度を計算</p><div class="tabs"><button class="tab active" onclick="switchTab('sides')">2辺から計算</button><button class="tab" onclick="switchTab('angle')">角度＋1辺から計算</button></div><div id="tab-sides"><div class="card"><div class="card-title">直角三角形の図</div><div class="triangle-wrap"><svg class="triangle-svg" viewBox="0 0 180 120" fill="none"><polygon points="20,100 160,100 20,10" stroke="#2d3148" stroke-width="2" fill="rgba(94,231,192,0.05)"/><rect x="20" y="85" width="13" height="13" stroke="#5ee7c0" stroke-width="1.5" fill="none"/><text x="90" y="115" fill="#6b7280" font-size="11" text-anchor="middle" font-family="DM Mono">底辺 a</text><text x="6" y="58" fill="#6b7280" font-size="11" text-anchor="middle" font-family="DM Mono">高さ b</text><text x="115" y="48" fill="#5ee7c0" font-size="11" text-anchor="middle" font-family="DM Mono" transform="rotate(-48 115 48)">斜辺 c</text><path d="M 148,100 A 18,18 0 0,0 135,91" stroke="#7b8cff" stroke-width="1.5" fill="none"/><text x="143" y="97" fill="#7b8cff" font-size="10" font-family="DM Mono">θ</text></svg></div><div class="input-grid"><div class="input-group"><label>底辺 <span>a</span></label><input type="number" id="s-a" placeholder="例: 3" min="0" step="any"></div><div class="input-group"><label>高さ <span>b</span></label><input type="number" id="s-b" placeholder="例: 4" min="0" step="any"></div><div class="input-group full"><label>斜辺 <span>c</span></label><input type="number" id="s-c" placeholder="例: 5" min="0" step="any"></div></div><div class="error-msg" id="s-error"></div><button class="calc-btn" onclick="calcSides()">計算する</button><button class="clear-btn" onclick="clearSides()">クリア</button></div><div class="card hidden" id="s-result-card"><div class="card-title">計算結果</div><div class="result-grid" id="s-results"></div></div></div><div id="tab-angle" class="hidden"><div class="card"><div class="card-title">入力（角度θ＋辺を1つ）</div><div class="input-grid"><div class="input-group full"><label>角度 <span>θ</span>（度）</label><input type="number" id="a-theta" placeholder="例: 30" min="0" max="89" step="any"></div><div class="input-group"><label>底辺 <span>a</span></label><input type="number" id="a-a" placeholder="どれか1つ" min="0" step="any"></div><div class="input-group"><label>高さ <span>b</span></label><input type="number" id="a-b" placeholder="どれか1つ" min="0" step="any"></div><div class="input-group full"><label>斜辺 <span>c</span></label><input type="number" id="a-c" placeholder="どれか1つ" min="0" step="any"></div></div><div class="error-msg" id="a-error"></div><button class="calc-btn" onclick="calcAngle()">計算する</button><button class="clear-btn" onclick="clearAngle()">クリア</button></div><div class="card hidden" id="a-result-card"><div class="card-title">計算結果</div><div class="result-grid" id="a-results"></div></div></div><script>const fmt=v=>isNaN(v)?'—':parseFloat(v.toFixed(4)).toString();function switchTab(t){document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',(t==='sides'&&i===0)||(t==='angle'&&i===1)));document.getElementById('tab-sides').classList.toggle('hidden',t!=='sides');document.getElementById('tab-angle').classList.toggle('hidden',t!=='angle')}function showError(id,msg){const el=document.getElementById(id);el.textContent=msg;el.classList.add('show')}function hideError(id){document.getElementById(id).classList.remove('show')}function renderResults(cid,items){document.getElementById(cid).innerHTML=items.map((item,i)=>`<div class="result-item ${item.full?'full':''} ${item.highlight?'highlight':''}" style="animation-delay:${i*.05}s"><div class="result-label">${item.label}</div><div class="result-value">${item.value}</div></div>`).join('')}function calcSides(){hideError('s-error');const a=parseFloat(document.getElementById('s-a').value),b=parseFloat(document.getElementById('s-b').value),c=parseFloat(document.getElementById('s-c').value),filled=[!isNaN(a),!isNaN(b),!isNaN(c)].filter(Boolean).length;if(filled<2){showError('s-error','2辺を入力してください');return}if(filled>2){showError('s-error','入力は2辺まで（1辺は空欄に）');return}let ra=a,rb=b,rc=c;if(isNaN(rc))rc=Math.sqrt(ra*ra+rb*rb);else if(isNaN(rb))rb=Math.sqrt(rc*rc-ra*ra);else if(isNaN(ra))ra=Math.sqrt(rc*rc-rb*rb);if(isNaN(ra)||isNaN(rb)||isNaN(rc)||ra<0||rb<0||rc<ra||rc<rb){showError('s-error','入力値が直角三角形として成立しません');return}const theta=Math.atan(rb/ra)*180/Math.PI,area=.5*ra*rb;document.getElementById('s-result-card').classList.remove('hidden');renderResults('s-results',[{label:'底辺 a',value:fmt(ra),highlight:isNaN(a)},{label:'高さ b',value:fmt(rb),highlight:isNaN(b)},{label:'斜辺 c',value:fmt(rc),highlight:isNaN(c)},{label:'角度 θ',value:fmt(theta)+'°'},{label:'角度 φ（上角）',value:fmt(90-theta)+'°'},{label:'面積',value:fmt(area),full:true}])}function clearSides(){['s-a','s-b','s-c'].forEach(id=>document.getElementById(id).value='');hideError('s-error');document.getElementById('s-result-card').classList.add('hidden')}function calcAngle(){hideError('a-error');const theta=parseFloat(document.getElementById('a-theta').value),a=parseFloat(document.getElementById('a-a').value),b=parseFloat(document.getElementById('a-b').value),c=parseFloat(document.getElementById('a-c').value);if(isNaN(theta)||theta<=0||theta>=90){showError('a-error','角度θは0〜90度（除く）で入力');return}const filled=[!isNaN(a),!isNaN(b),!isNaN(c)].filter(Boolean).length;if(filled===0){showError('a-error','辺を1つ入力してください');return}if(filled>1){showError('a-error','辺は1つだけ入力してください');return}const tRad=theta*Math.PI/180;let ra,rb,rc;if(!isNaN(a)){ra=a;rb=a*Math.tan(tRad);rc=a/Math.cos(tRad)}else if(!isNaN(b)){rb=b;ra=b/Math.tan(tRad);rc=b/Math.sin(tRad)}else{rc=c;ra=c*Math.cos(tRad);rb=c*Math.sin(tRad)}document.getElementById('a-result-card').classList.remove('hidden');renderResults('a-results',[{label:'底辺 a',value:fmt(ra),highlight:isNaN(a)},{label:'高さ b',value:fmt(rb),highlight:isNaN(b)},{label:'斜辺 c',value:fmt(rc),highlight:isNaN(c)},{label:'角度 θ',value:fmt(theta)+'°'},{label:'角度 φ（上角）',value:fmt(90-theta)+'°'},{label:'面積',value:fmt(.5*ra*rb),full:true}])}function clearAngle(){['a-theta','a-a','a-b','a-c'].forEach(id=>document.getElementById(id).value='');hideError('a-error');document.getElementById('a-result-card').classList.add('hidden')}</script></body></html>
